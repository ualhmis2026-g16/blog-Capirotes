# Nombre del flujo de trabajo actualizado para 2026
name: Build and deploy Jekyll site to Azure Web App - hmis-jeb419

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Ruby para poder usar Jekyll
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # 2. Instalar Jekyll y compilar el sitio
      - name: Build with Jekyll
        run: |
          gem install jekyll bundler
          jekyll build --baseurl "" [cite: 51]

      # 3. Subir el contenido de la carpeta _site como artefacto
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app # Mantenemos el nombre del artefacto para el siguiente job
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_40550AAF2FCC4FB9AB0E223D62856868 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2470E052CE58492B8CCAB1003D80370E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E4FBF2DACBC8480AB5054342850DE772 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hmis-jeb419'
          slot-name: 'Production'
          package: .
